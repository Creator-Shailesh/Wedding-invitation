<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <title>Wedding Invitation</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .countdown { font-size: 50px; color: #d9534f; }
        .section { padding: 50px 0; text-align: center; }
        .fade-in { animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="row">
            <div class="col-12 text-center">
                <h1 class="fade-in">You're Invited!</h1>
                <p class="fade-in">Join us for a beautiful wedding celebration.</p>
                <div id="countdown" class="countdown fade-in"></div>
            </div>
        </div>
    </div>

    <div class="section bg-light">
        <div class="container">
            <h2>Details</h2>
            <p>The wedding will take place on <strong>March 26, 2026</strong> at <strong>5 PM</strong>.</p>
        </div>
    </div>

    <div class="section bg-white">
        <div class="container">
            <h2>RSVP</h2>
            <p>Please let us know if you can attend.</p>
        </div>
    </div>

    <script>
        // Countdown Timer
        const weddingDate = new Date("March 26, 2026 17:00:00").getTime();
        const countdownFunction = setInterval(function() {
            const now = new Date().getTime();
            const distance = weddingDate - now;
            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);
            document.getElementById("countdown").innerHTML = days + "d " + hours + "h " + minutes + "m " + seconds + "s ";
            if (distance < 0) {
                clearInterval(countdownFunction);
                document.getElementById("countdown").innerHTML = "EXPIRED";
            }
        }, 1000);
    </script>
</body>
</html>
